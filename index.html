<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebate Calendar Calculator</title>

<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  input, select, textarea { display: block; margin-bottom: 10px; width: 300px; padding: 5px; }
  textarea { height: 150px; }
  button { padding: 10px 20px; font-size: 16px; border-radius: 4px; border: none; margin-right: 10px; cursor: pointer; }
  table { border-collapse: collapse; margin-top: 10px; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  .valid-range { background-color: #c6efce; }
  #modeLabel { font-size: 18px; font-weight: bold; margin-top: 20px; }
  #loginContainer { text-align:center; margin-top:100px; }

  .flex-container { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .flex-child { flex: 1; min-width: 350px; }

  .result-container {
    width: 100%;
    max-height: 600px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 5px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginContainer">
  <h2>Login</h2>
  <p>Please enter your credentials to access the calculator.</p>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginMessage" style="color:red;"></p>
</div>

<!-- APP -->
<div id="appContainer" style="display:none;">

<h2>Rebate Calendar Calculator</h2>

<div class="flex-container">
  <div class="flex-child">

    <label>1. Rebate Date (YYYY-MM-DD HH:MM:SS)</label>
    <input type="text" id="rebateDate">

    <label>2. Tier</label>
    <select id="tier">
      <option value="1">Tier 1 (5 days)</option>
      <option value="2">Tier 2 (7 days)</option>
      <option value="3">Tier 3 (9 days)</option>
    </select>

    <label>3. Purchase Dates</label>
    <textarea id="purchaseDates"></textarea>

    <button onclick="calculateAcorn()" style="background:#FFFF00;">Calculate (ACORN + LEGENDS)</button>
    <button onclick="calculateLegends()" style="background:#8A2BE2;color:white;">Calculate (OLD_LEGENDS)</button>
    <button onclick="logout()" style="background:#f44336;color:white;">Logout</button>

  </div>

  <div class="flex-child">
    <h3>Timezone Converter (UTC Input)</h3>
    <input type="text" id="timezoneInput" oninput="updateTimezones()">
    <div id="timezoneResult" class="result-container"></div>
  </div>
</div>

<h3>Result</h3>
<div id="modeLabel"></div>
<div id="result" class="result-container"></div>

</div>

<script>
/* LOGIN */
const USERNAME = "LEGENDS_ADMIN";
const PASSWORD = "AcornLegends2025";

function login(){
  if(username.value===USERNAME && password.value===PASSWORD){
    localStorage.setItem("loggedIn","true");
    loginContainer.style.display="none";
    appContainer.style.display="block";
  } else loginMessage.textContent="Invalid username or password.";
}

if(localStorage.getItem("loggedIn")==="true"){
  loginContainer.style.display="none";
  appContainer.style.display="block";
}

function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

/* UTILITIES */
function parseLocalDate(str){
  if(!str) return null;
  const d=new Date(str.replace(" ","T"));
  return isNaN(d)?null:d;
}

function format24h(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

/* 🔐 SAFE PERIOD FUNCTION (NEW) */
function getPeriodDays(tier){
  if(tier===1) return 5;
  if(tier===2) return 7;
  return 9;
}

/* LEGENDS */
function calculateLegends(){
  const rebateDate=parseLocalDate(rebateDateInput.value);
  const tierVal=parseInt(tier.value);
  const periodDays=getPeriodDays(tierVal);

  const purchases=purchaseDates.value.split(/\n+/).map(parseLocalDate).filter(Boolean).sort((a,b)=>a-b);
  const lastPurchase=purchases[purchases.length-1];
  if(!rebateDate||!lastPurchase) return alert("Invalid input");

  let results=[];
  let rangeStart=new Date(rebateDate);
  let first=true;

  while(rangeStart<=lastPurchase){
    let rangeEnd=new Date(rangeStart);

    if(first){
      if(rangeStart.getHours()<8){
        rangeEnd.setHours(8,0,0,0);
      } else {
        rangeEnd.setDate(rangeEnd.getDate()+1);
        rangeEnd.setHours(8,0,0,0);
      }
      rangeEnd.setDate(rangeEnd.getDate()+(periodDays-1));
      first=false;
    } else {
      rangeEnd.setDate(rangeEnd.getDate()+periodDays);
      rangeEnd.setHours(8,0,0,0);
    }

    const days={};
    for(const d of purchases){
      if(d>=rangeStart && d<rangeEnd){
        const adj=new Date(d);
        if(d.getHours()<8) adj.setDate(adj.getDate()-1);
        days[adj.toISOString().slice(0,10)]=1;
      }
    }

    results.push({start:new Date(rangeStart),end:new Date(rangeEnd),uniqueDays:Object.keys(days),totalPurchases:Object.keys(days).length});
    rangeStart=new Date(rangeEnd);
  }
  renderTable(results,"#8A2BE2","LEGENDS");
}

/* ACORN */
function calculateAcorn(){
  const rebateDate=parseLocalDate(rebateDateInput.value);
  const tierVal=parseInt(tier.value);
  const periodDays=getPeriodDays(tierVal);

  const purchases=purchaseDates.value.split(/\n+/).map(parseLocalDate).filter(Boolean).sort((a,b)=>a-b);
  const lastPurchase=purchases[purchases.length-1];
  if(!rebateDate||!lastPurchase) return alert("Invalid input");

  let results=[];
  let rangeStart=new Date(rebateDate);

  while(rangeStart<=lastPurchase){
    let rangeEnd=new Date(rangeStart);
    rangeEnd.setDate(rangeEnd.getDate()+periodDays);

    const days={};
    for(const d of purchases){
      if(d>=rangeStart && d<rangeEnd){
        const idx=Math.floor((d-rebateDate)/(86400000));
        const label=new Date(rebateDate);
        label.setDate(rebateDate.getDate()+idx);
        days[label.toISOString().slice(0,10)]=1;
      }
    }

    results.push({start:new Date(rangeStart),end:new Date(rangeEnd),uniqueDays:Object.keys(days),totalPurchases:Object.keys(days).length});
    rangeStart=new Date(rangeEnd);
  }
  renderTable(results,"#FFFF00","ACORN");
}

/* RENDER */
function renderTable(results,color,mode){
  modeLabel.innerHTML=`Results — ${mode==="ACORN"?"ACORN + LEGENDS":"OLD_LEGENDS"}`;
  let html=`<table><tr><th>Range Start</th><th>Range End</th><th>Unique Days</th><th>Total</th></tr>`;
  results.forEach(r=>{
    html+=`<tr class="${r.totalPurchases?'valid-range':''}">
      <td>${format24h(r.start)}</td>
      <td>${format24h(r.end)}</td>
      <td>${r.uniqueDays.join("<br>")||"-"}</td>
      <td>${r.totalPurchases}</td>
    </tr>`;
  });
  html+="</table>";
  result.innerHTML=html;
}

/* TIMEZONE */
function updateTimezones(){
  const dt=parseLocalDate(timezoneInput.value);
  if(!dt) return;
  const zones={PST:-8,MST:-7,CST:-6,EST:-5};
  let html="<table><tr><th>Zone</th><th>Time</th></tr>";
  for(const z in zones){
    const d=new Date(dt.getTime()+zones[z]*3600000);
    html+=`<tr><td>${z}</td><td>${format24h(d)}</td></tr>`;
  }
  html+="</table>";
  timezoneResult.innerHTML=html;
}
</script>

<p style="text-align:right;font-style:italic;margin-top:40px;">— by: Paul P</p>

</body>
</html>
